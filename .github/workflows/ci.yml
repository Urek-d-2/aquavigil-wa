name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytest pytest-cov flake8

      - name: Lint (flake8 — erreurs bloquantes uniquement)
        run: |
          # Erreurs de syntaxe / noms indéfinis = échec
          flake8 scripts/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style : rapport non bloquant
          flake8 scripts/ tests/ --count --max-line-length=100 --exit-zero --statistics

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=kraken2_runner --cov-config=/dev/null \
                 --cov-report=term-missing

  snakemake-lint:
    name: Snakemake dry-run & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snakemake
        run: pip install "snakemake>=7.32"

      - name: Lint du workflow
        run: snakemake --lint -s workflow/Snakefile || true

      - name: Dry-run (DAG, sans exécution)
        run: snakemake -n -s workflow/Snakefile --cores 1 || true
